<header class="navbar-shell" [class.navbar-shell--solid]="isSolid()">
  <div class="container">
    <nav class="navbar navbar-expand-lg px-0 navbar-layout">
      <a class="navbar-brand brand-mark" routerLink="/">
        <img src="emovex.png" alt="Logo de la empresa" class="d-block brand-logo" />
      </a>

      <button
        class="navbar-toggler border-0 shadow-none"
        type="button"
        aria-label="Abrir navegación"
        [attr.aria-expanded]="menuOpen()"
        (click)="toggleMenu()"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" [class.show]="menuOpen()">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item">
            <a class="nav-link" href="#soluciones" (click)="closeMenu()">
              {{ language() === 'es' ? 'Soluciones' : 'Solutions' }}
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#ventajas" (click)="closeMenu()">
              {{ language() === 'es' ? 'Ventajas' : 'Benefits' }}
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#distribucion" (click)="closeMenu()">
              {{ language() === 'es' ? 'Distribución' : 'Distribution' }}
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#contacto" (click)="closeMenu()">
              {{ language() === 'es' ? 'Contacto' : 'Contact' }}
            </a>
          </li>
          <li class="nav-item ms-lg-2">
            <div class="language-switch" role="group" aria-label="Selector de idioma">
              <button
                class="language-switch__btn"
                type="button"
                [class.is-active]="language() === 'es'"
                (click)="setLanguage('es')"
              >
                ES
              </button>
              <button
                class="language-switch__btn"
                type="button"
                [class.is-active]="language() === 'en'"
                (click)="setLanguage('en')"
              >
                EN
              </button>
            </div>
          </li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-sm btn-accent" href="#contacto" (click)="closeMenu()">
              {{ language() === 'es' ? 'Solicitar demo' : 'Request demo' }}
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </div>
</header>
